
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finapp
      POSTGRES_PASSWORD: finapp_local
      POSTGRES_DB: financial_stre
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finapp -d financial_stre"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - .:/app
      - /app/.venv
    depends_on:
      db:
        condition: service_healthy
    environment:
      PYTHONPATH: /app
      DB_URL: postgresql://finapp:finapp_local@db:5432/financial_stre
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}

volumes:
  pgdata:
